; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html
[platformio]
src_dir = .
default_envs = lissabon-simple-remote

[common]
framework = arduino
lib_ldf_mode = deep+
lib_compat_mode = strict
lib_deps =
    https://github.com/cwi-dis/iotsa.git#develop
    libLissabon
    h2zero/NimBLE-Arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

;
; esp32dev: has a PRG/BOOT button (GPIO0, reused as the on/off pushbutton)
; and an onboard LED (GPIO2, mirrors the remote dimmer's confirmed state).
;
[env:lissabon-simple-remote]
extends = common
platform = espressif32@6.9.0
board = esp32dev
board_build.partitions = min_spiffs.csv ; BLE stack takes up a lot of space
build_flags = -DIOTSA_WITH_BLE -DDIMMER_WITHOUT_LEVEL -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
